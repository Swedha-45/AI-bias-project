<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AI Bias Auditor | Sign In</title>
    <script src="theme.js"></script>
    <style>
        :root {
            --body-bg: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.2), transparent 45%),
                        radial-gradient(circle at 90% 75%, rgba(34, 211, 238, 0.15), transparent 50%),
                        linear-gradient(135deg, #0a0f1c 0%, #0f172a 100%);
            --body-text: #e2e8f0;
            --brand-gradient: linear-gradient(120deg, #a5f3fc, #818cf8);
            --title-gradient: linear-gradient(125deg, #f0f9ff, #b9d0f0);
            --card-bg: rgba(18, 25, 45, 0.78);
            --card-border: rgba(148, 163, 184, 0.28);
            --subtitle-text: #9aa9c5;
            --label-text: #a0afc3;
            --input-bg: rgba(2, 8, 23, 0.7);
            --input-border: rgba(148, 163, 184, 0.35);
            --input-text: #f1f5f9;
            --input-placeholder: #5b6e8c;
            --nav-link-text: #94a3b8;
            --nav-link-bg: rgba(148, 163, 184, 0.05);
            --footer-note: #5f7396;
            --theme-toggle-bg: rgba(15, 23, 42, 0.78);
            --theme-toggle-border: rgba(148, 163, 184, 0.22);
            --theme-toggle-text: #e2e8f0;
        }

        [data-theme="light"] {
            --body-bg: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.1), transparent 45%),
                        radial-gradient(circle at 90% 75%, rgba(34, 211, 238, 0.08), transparent 50%),
                        linear-gradient(135deg, #f8fbff 0%, #e8eef9 100%);
            --body-text: #0f172a;
            --brand-gradient: linear-gradient(120deg, #0f172a, #2563eb);
            --title-gradient: linear-gradient(125deg, #0f172a, #334155);
            --card-bg: rgba(255, 255, 255, 0.84);
            --card-border: rgba(148, 163, 184, 0.24);
            --subtitle-text: #475569;
            --label-text: #475569;
            --input-bg: rgba(255, 255, 255, 0.92);
            --input-border: rgba(148, 163, 184, 0.32);
            --input-text: #0f172a;
            --input-placeholder: #64748b;
            --nav-link-text: #64748b;
            --nav-link-bg: rgba(148, 163, 184, 0.08);
            --footer-note: #64748b;
            --theme-toggle-bg: rgba(255, 255, 255, 0.9);
            --theme-toggle-border: rgba(148, 163, 184, 0.28);
            --theme-toggle-text: #0f172a;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: var(--body-bg);
            color: var(--body-text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            overflow-x: hidden;
        }

        /* Main Container - Compact & Centered */
        .login-wrapper {
            width: 100%;
            max-width: 460px;
            margin: 0 auto;
            animation: fadeSlideUp 0.45s ease-out;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Glass Card - Compact Professional */
        .card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            border: 1px solid var(--card-border);
            border-radius: 32px;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.45);
            padding: 28px 32px;
            transition: all 0.2s ease;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 20px;
        }

        /* Brand Section */
        .brand {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            background: var(--brand-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            padding: 0 2px;
        }

        .brand::before {
            content: "⚖️";
            background: none;
            width: auto;
            height: auto;
            font-size: 1.1rem;
            filter: drop-shadow(0 0 2px rgba(99,102,241,0.4));
        }

        .theme-toggle {
            border: 1px solid var(--theme-toggle-border);
            background: var(--theme-toggle-bg);
            color: var(--theme-toggle-text);
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 0.78rem;
            font-weight: 600;
            cursor: pointer;
        }

        /* Headings */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.3px;
            background: var(--title-gradient);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }

        .subtitle {
            color: var(--subtitle-text);
            font-size: 0.85rem;
            border-left: 3px solid #4f46e5;
            padding-left: 14px;
            margin-bottom: 28px;
            line-height: 1.4;
        }

        /* Form Fields - Clean & Modern */
        .form-grid {
            display: flex;
            flex-direction: column;
            gap: 18px;
            margin-bottom: 8px;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--label-text);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            font-size: 1rem;
            opacity: 0.65;
            pointer-events: none;
        }

        .field input {
            width: 100%;
            padding: 12px 14px 12px 40px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 44px;
            font-size: 0.9rem;
            color: var(--input-text);
            font-weight: 450;
            transition: all 0.2s ease;
            outline: none;
            backdrop-filter: blur(4px);
        }

        .field input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.2);
            background: rgba(15, 23, 42, 0.9);
        }

        .field input::placeholder {
            color: var(--input-placeholder);
            font-weight: 400;
            font-size: 0.85rem;
        }

        /* Compact Button - Professional Gradient */
        .btn-primary {
            width: 100%;
            background: linear-gradient(105deg, #4f46e5, #3b82f6);
            border: none;
            padding: 11px 20px;
            border-radius: 44px;
            font-weight: 600;
            font-size: 0.85rem;
            color: white;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.3);
            margin-top: 12px;
            letter-spacing: 0.3px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            background: linear-gradient(105deg, #6366f1, #2563eb);
            box-shadow: 0 8px 18px -6px #4f46e5;
        }

        .btn-primary:active {
            transform: translateY(1px);
        }

        /* Loading State for Button */
        .btn-primary.loading {
            pointer-events: none;
            opacity: 0.8;
            transform: scale(0.98);
        }

        .spinner-sm {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top: 2px solid white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Navigation Links */
        .nav-links {
            margin-top: 22px;
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: var(--nav-link-text);
            text-decoration: none;
            font-size: 0.8rem;
            padding: 6px 14px;
            border-radius: 40px;
            transition: all 0.2s ease;
            background: var(--nav-link-bg);
        }

        .nav-links a:hover {
            color: #a5f3fc;
            background: rgba(99, 102, 241, 0.2);
            transform: translateY(-1px);
        }

        /* Footer Note */
        .footer-note {
            margin-top: 20px;
            text-align: center;
            font-size: 0.65rem;
            color: var(--footer-note);
            border-top: 1px solid rgba(148, 163, 184, 0.15);
            padding-top: 16px;
        }

        /* Responsive */
        @media (max-width: 500px) {
            .login-wrapper {
                max-width: 94%;
            }
            .card {
                padding: 22px 24px;
            }
            .card-header {
                flex-direction: column;
                align-items: flex-start;
            }
            h1 {
                font-size: 1.5rem;
            }
            .subtitle {
                font-size: 0.75rem;
                margin-bottom: 22px;
            }
            .field input {
                padding: 10px 12px 10px 38px;
                font-size: 0.85rem;
            }
        }

        /* Remove extra scroll, body centered */
        html, body {
            height: 100%;
            background-attachment: fixed;
        }
    </style>
</head>
<body>
<div class="login-wrapper">
    <div class="card">
        <div class="card-header">
            <div class="brand">AI Bias Auditor</div>
            <button type="button" class="theme-toggle" data-theme-toggle>Light mode</button>
        </div>
        <h1>Welcome Back</h1>
        <p class="subtitle">Sign in to continue auditing AI models for bias and fairness.</p>
        
        <div class="form-grid">
            <div class="field">
                <label>👤 Username</label>
                <div class="input-group">
                    <span class="input-icon">@</span>
                    <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
                </div>
            </div>
            <div class="field">
                <label>🔒 Password</label>
                <div class="input-group">
                    <span class="input-icon">• • •</span>
                    <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
                </div>
            </div>
        </div>
        
        <button type="button" class="btn-primary" id="loginBtn">✨ Sign In</button>
        
        <div class="nav-links">
            <a href="register.html">🔐 Create Account</a>
        </div>
        <div class="footer-note">
            Secure access • AI fairness auditing platform
        </div>
    </div>
</div>

<script>
    // ---------- PRESERVE EXACT FUNCTIONALITY ----------
    // - Same endpoint: http://127.0.0.1:8000/token
    // - FormData with 'username' and 'password'
    // - Token stored in localStorage, redirect to home.html
    // - Alert "Failed" on error
    // - Added visual loading state WITHOUT altering core logic
    
    // Get references to input fields (maintaining original variable naming for compatibility)
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginButton = document.getElementById('loginBtn');
    
    // Core login function - IDENTICAL logic to original
    async function login() {
        // Retrieve values exactly as original (using .value)
        const username = usernameInput ? usernameInput.value : '';
        const password = passwordInput ? passwordInput.value : '';
        
        // Create FormData and append fields (original behavior)
        const formData = new FormData();
        formData.append('username', username);
        formData.append('password', password);
        
        // Visual loading state (does NOT affect API response or logic)
        const originalBtnText = loginButton.innerHTML;
        loginButton.innerHTML = '<span class="spinner-sm"></span> Signing in...';
        loginButton.classList.add('loading');
        
        try {
            // EXACT original fetch call
            const response = await fetch('http://127.0.0.1:8000/token', {
                method: 'POST',
                body: formData
            });
            
            const data = await response.json();
            
            // Original authentication logic
            if (data.access_token) {
                localStorage.setItem('token', data.access_token);
                window.location.href = "home.html";
            } else {
                alert("Failed");
            }
        } catch (error) {
            // Network errors also show "Failed" as original behavior
            alert("Failed");
        } finally {
            // Restore button only if not redirected (prevents flicker)
            if (loginButton && window.location.pathname.indexOf('home.html') === -1) {
                loginButton.innerHTML = originalBtnText;
                loginButton.classList.remove('loading');
            }
        }
    }
    
    // Attach login function to button click
    if (loginButton) {
        // Clean event listener (preserves original onclick behavior)
        const newLoginBtn = loginButton.cloneNode(true);
        loginButton.parentNode.replaceChild(newLoginBtn, loginButton);
        newLoginBtn.addEventListener('click', (e) => {
            e.preventDefault();
            login();
        });
        newLoginBtn.id = 'loginBtn';
    }
    
    // Optional: Press Enter to submit (enhanced UX without breaking functionality)
    const handleKeyPress = (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            login();
        }
    };
    
    if (usernameInput) usernameInput.addEventListener('keypress', handleKeyPress);
    if (passwordInput) passwordInput.addEventListener('keypress', handleKeyPress);
    
    // Expose login globally for any inline calls (backward compatibility)
    window.login = login;
    initializeThemeToggle();
    
    // Prefill check: no auto token redirect, keep clean
    // Ensure no white screen flash
    document.body.style.backgroundColor = 'transparent';
</script>
</body>
</html>
